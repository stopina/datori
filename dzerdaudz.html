<!DOCTYPE html>
<html>
<body>
<script>
function maksa(){
 
    let dz = document.querySelectorAll('input[type="checkbox"]');
    let sum = 0;
    for(let i = 0; i < dz.length; i++) {
       if(dz[i].checked) sum += Number(dz[i].value);
    }
    document.getElementById("maksa").innerHTML = "Jāmaksā " + sum.toFixed(2);
 }   
</script>
<p id="maksa"></p>
<form>
  <input type="checkbox" id="kafija" name="kafija" value="3.60">
  <label for="kafija">kafija (3.60)</label><br>
  <input type="checkbox" id="sula"  name="sula" value="2.50">
  <label for="sula">sula (2.50)</label><br>
  <input type="checkbox" id="kakao" name="kakao" value="3.20">
  <label for="kakao">kakao (3.20)</label><br>
  <input type="checkbox" id="teja" name="teja" value="1.80">
  <label for="teja">tēja (1.80)</label><br><br>
  
  <input type="button" id="poga" value="jāmaksā" onclick="maksa()">
</form> 
</body>
</html>
